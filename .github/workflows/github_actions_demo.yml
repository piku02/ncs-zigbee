name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out github actions
on: [push]
jobs:
  Explore-Github-Actions:
    runs-on: ubuntu latests
    steps:
    - run: echo "job was triggered by ${{ github.event_name}} event."
    - run: echo "job is running on ${{ runner.os }}"
    - run: echo "name of branch is ${{github.ref}}. and repo is ${{github.repository}}"
    - name: Checkout repository code
      uses: actions/checkout@v4
    - run: echo "repo ${{github.repository}} has been cloned to the runner"
    - name: List files in repo
      run: |
        ls ${{ github.workspace }}
    - run: echo "job status is this job status is ${{job.status}},"