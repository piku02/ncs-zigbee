name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out github actions
on: [push]
jobs:
  Explore-Github-Actions:
    runs-on: ubuntu-22.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:v2.7.99
    defaults:
      run:
        # Bash shell is needed to set toolchain related environment variables in docker container
        # It is a workaround for GitHub Actions limitation https://github.com/actions/runner/issues/1964
        shell: bash
    steps:
    - run: echo "job was triggered by ${{ github.event_name}} event."
    - run: echo "job is running on ${{ runner.os }}"
    - run: echo "name of branch is ${{github.ref}}. and repo is ${{github.repository}}"
    - name: Checkout repository code
      uses: actions/checkout@v4
    - run: echo "repo ${{github.repository}} has been cloned to the runner"
    - name: List files in repo
      run: ls
    - run: echo "job status is this job status is ${{job.status}},"
  Discover-targets:
    runs-on: ubuntu-22.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:v2.7.99
    defaults:
      run:
        # Bash shell is needed to set toolchain related environment variables in docker container
        # It is a workaround for GitHub Actions limitation https://github.com/actions/runner/issues/1964
        shell: bash
    steps: 
    - name: Checkout repository code
      uses: actions/checkout@v4
    - name: prepare west project
      run: |
        west init
        west update
    - name: Build samples
      run: |
        twister --inline-logs --build-only -N --verbose -T samples --all -x CONFIG_ZBOSS_HALT_ON_ASSERT=y -x CONFIG_RESET_ON_FATAL_ERROR=n -x CONFIG_FACTORY_RESET_PRESS_TIME_SECONDS=2
      